global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI prediction API
  - job_name: automl-api
    static_configs:
      - targets:
          - api:8000        # docker-compose service name
          # - localhost:8000  # uncomment for local dev without Docker
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
